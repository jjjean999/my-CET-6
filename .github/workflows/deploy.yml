name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 必须授予 Pages 发布所需的权限（使用 GitHub Actions 作为发布来源时）。
permissions:
  contents: read
  pages: write
  id-token: write

# 避免并发部署互相覆盖。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 将整个 dist 目录作为制品原子上传，避免只部署了 index.html 而漏掉 assets。
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
